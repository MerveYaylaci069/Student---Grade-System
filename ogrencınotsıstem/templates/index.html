<!DOCTYPE html>
<html>
<head>

<title>Öğrenci Not Sistemi</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body style="background:linear-gradient(to right,#4facfe,#00f2fe);">

<div class="container mt-5">

<div class="card shadow p-4">

<h2 class="text-center mb-4">🎓 Öğrenci Not Sistemi</h2>

<form action="/kaydet" method="post">

<div class="mb-3">
<label class="form-label">Ad</label>
<input type="text" name="adi" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Soyad</label>
<input type="text" name="soyadi" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Şifre</label>
<input type="password" name="sifre" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Vize</label>
<input type="number" name="vize" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Final</label>
<input type="number" name="final" class="form-control">
</div>

<div class="text-center">
<button class="btn btn-primary">Kaydet</button>
</div>

</form>

</div>

</div>

</body>
</html>
